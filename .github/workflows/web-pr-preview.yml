name: Web PR preview

# Every PR touching the web app deploys its branch to Cloudflare Pages (free,
# direct upload) at a real root-served URL — same pattern as wenpoints.xyz.
on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-pr-preview.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version asset URLs per deploy (cache busting)
        run: sed -i "s/\.js?v=[0-9a-z]*/.js?v=${GITHUB_SHA::7}/g" apps/web/index.html

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web --project-name=helix-predict --branch=${{ github.head_ref }} --commit-dirty=true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.deployment-url }}';
            const marker = '<!-- web-pr-preview -->';
            const body = [
              marker,
              `🔎 **Live preview:** ${url}`,
              '',
              'Deployed to Cloudflare Pages from this PR — updates on every push.',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
