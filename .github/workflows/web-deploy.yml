name: Deploy web

# Production deploy of the arcade UI (apps/web) to Cloudflare Pages on push to main.
# The custom domains predict.wenpoints.xyz + predict.test.wenpoints.xyz are attached to this
# Pages project, so this keeps them current. (PRs get their own CF preview via web-pr-preview.yml.)
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/web-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp build (cache-bust all versioned assets + footer sha/time)
        run: |
          sed -i "s/?v=[0-9a-z]*/?v=${GITHUB_SHA::7}/g" apps/web/index.html
          sed -i "s/__BUILD_SHA__/${GITHUB_SHA::7}/; s/__BUILD_TIME__/$(date -u '+%Y-%m-%d %H:%M UTC')/" apps/web/index.html
      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web --project-name=helix-predict --branch=main --commit-dirty=true
