[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true                     # house/vault structs push the legacy stack too deep
evm_version = "shanghai"          # matches the wenpoints guestbook + Injective EVM
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@pythnetwork/pyth-sdk-solidity/=lib/pyth-sdk-solidity/",
    "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 1000

[invariant]
runs = 512
depth = 500
fail_on_revert = false

[fmt]
line_length = 110
